name: ghost_ride
description: "A new Flutter project for bike racing against ghosts."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  flutter_map: ^8.2.2
  latlong2: ^0.9.1

  # Daten & Sensoren
  sqflite: ^2.4.2
  path: ^1.9.1
  sensors_plus: ^7.0.0
  geolocator: ^14.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: "^0.13.1"

# Konfiguration für das App-Icon
flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/icon/app_icon_ghost.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/icon/app_icon_ghost.png"

flutter:
  uses-material-design: true

  # Hier ist dein neues Logo registriert:
  assets:
    - assets/icon/app_icon_ghost.png